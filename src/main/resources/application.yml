spring:
  application:
    name: marginalia
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:marginalia}
    username: ${DB_USERNAME:marginalia}
    password: ${DB_PASSWORD:marginalia}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health, info

jwt:
  secret: ${JWT_SECRET}
  expiry-ms: ${JWT_EXPIRY_MS:86400000}

storage:
  type: ${STORAGE_TYPE:local}
  local:
    path: ${STORAGE_LOCAL_PATH:/tmp/marginalia/pdfs}
  r2:
    account-id: ${R2_ACCOUNT_ID:}
    access-key: ${R2_ACCESS_KEY:}
    secret-key: ${R2_SECRET_KEY:}
    bucket-name: ${R2_BUCKET_NAME:}
